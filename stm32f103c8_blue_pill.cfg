#
# STM32F103C8 "Blue Pill" + ST-Link (SWD)，无 NRST 接线
#
# 与 Keil：Reset = SYSRESETREQ / 无 Connect under Reset 硬件复位
#
# stm32f1x.cfg 在 HLA(ST-Link) 下仍含 reset_config srst_nogate，
# 无 NRST 时必须覆盖为 none，否则 program 会 "timed out waiting for target halted"。
#
# 命令行烧录（PowerShell，复制即用）:
#   .\tools\flash_zncz_001.ps1
#
# program 合法参数: [verify] [reset] [exit] — 没有 "reset run"！
# "reset run" 必须单独一条 -c。
#
# 若 Target voltage 显示 ~0.9V：板子未供电，请 USB 给 Blue Pill 上电后再烧录。

source [find interface/stlink.cfg]
transport select hla_swd

# 电压/连线不稳时可改为 500
adapter speed 1000

# 真实 64KB 芯片请改为 0x10000；Blue Pill 常见超规格 128KB 用 0x20000
set FLASH_SIZE 0x10000
# C8 仅 20KB SRAM；Flash 算法默认 4KB(0x1000) 即可，勿超过 0x2000
set WORKAREASIZE 0x1000

source [find target/stm32f1x.cfg]

reset_config none
